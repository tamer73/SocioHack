defaults:
  - _self_

project:
  suffix: "YOUR_SUFFIX"  # Unique identifier suffix for this training run
  wandb_project: "YOUR_WANDB_PROJECT"  # Weights & Biases project name for experiment tracking
  save_base_path: ${oc.env:SOCIOHACK_SAVE_BASE_PATH,./checkpoints}  # Base directory path for checkpoints and outputs
  use_wandb: true  # Global switch for WandB logging (also controls TRL's built-in wandb)

dataset:
  name: "YOUR_DATASET_NAME_UNDER_HF_HOME"  # Name of the dataset under HuggingFace home directory
  subset: null  # Specific subset of the dataset to use (null for full dataset)
  hf_home: ${oc.env:HF_HOME,~/.cache/huggingface}  # HuggingFace home directory path
  validation_size: 0  # Size of validation split (0 for no validation split)
  intermediate_tag: "think"  # Tag used to mark intermediate reasoning steps in the dataset
  final_tag: "answer"  # Tag used to mark final answers in the dataset
  force_chat_template: false  # Whether to force conversational formatting by wrapping plain-text prompts into single user messages

model:
  name: "YOUR_MODEL_NAME"  # Name of the base model to load from HuggingFace
  name_vllm: "YOUR_MODEL_NAME_VLLM"  # Model name for vLLM server (usually the same as the base model)
  resume_from_checkpoint: false  # Whether to resume training from a previous checkpoint
  adapter_dir: ""  # Directory containing LoRA adapters to load
  latest_checkpoint_step: null  # Specific checkpoint step to resume from (null for latest)

training:
  # Batch settings
  batch_size: 6  # Number of samples per training batch
  gradient_accumulation_steps: 1  # Number of steps to accumulate gradients before updating weights
  num_generations: 6  # Number of rollouts to create per training sample
  
  # Training loop settings
  num_train_epochs: 2  # Total number of training epochs
  num_iterations: 1  # Number of iterations per epoch
  learning_rate: 2.0e-5  # The initial learning rate for AdamW
  beta: 0.0  # KL divergence penalty coefficient for RL training. If set to 0.0, reference model is not loaded, saving memory.
  
  # Checkpoint and logging
  save_model: false  # Whether to save model checkpoints (default: false to disable checkpoint saving)
  logging_steps: 10  # Frequency of logging training metrics
  save_steps: 100  # Frequency of saving model checkpoints
  eval_steps: 100  # Frequency of evaluation during training
  save_total_limit: 10  # Maximum number of checkpoints to keep
  evaluation_strategy: "no"  # Evaluation strategy ("no", "steps", "epoch")
  
  # Generation settings
  max_completion_length: 2048  # Maximum length of generated completions, for small completion length, the model may hardly response in the correct format.
  temperature: 0.7  # Temperature for sampling during generation
  top_p: 0.8       # Top-p sampling (Qwen3.5 non-thinking recommended: 0.8)
  top_k: 20        # Top-k sampling (Qwen3.5 recommended: 20)
  min_p: 0.0       # Min-p sampling
  presence_penalty: 1.5  # Presence penalty to reduce repetition (Qwen3.5 recommended: 1.5)
  # Qwen3.5 non-thinking mode: trl 0.29.0 forwards this via chat_template_kwargs in apply_chat_template
  enable_thinking: false
  
  # GRPO specific settings
  scale_rewards: false  # Whether to scale rewards during training (false = no scaling, as recommended by Dr.GRPO)
  epsilon: 0.1  # Epsilon value for GRPO algorithm
  epsilon_high: 0.28  # Upper bound epsilon for better exploration, see DAPO: https://huggingface.co/papers/2503.14476
  loss_type: "dr_grpo"  # Supports Dr.GRPO, see https://github.com/sail-sg/understand-r1-zero
  mask_truncated_completions: true  # Whether to mask truncated completions in loss calculation
  top_entropy_quantile: 0.2  # High-entropy token filtering, see https://huggingface.co/papers/2506.01939
  importance_sampling_level: "sequence"  # Sequence-level importance sampling, see GSPO: https://huggingface.co/papers/2507.18071
  use_transformers_paged: true  # Enables continuous batching for faster generation.
  
  # Reference model settings
  # NOTE: sync_ref_model=true is INCOMPATIBLE with PEFT/LoRA in TRL GRPOTrainer
  # (raises NotImplementedError). Kept false by default; the LoRA-compatible
  # analog is `lora_reset_every` below, which discretely re-initializes the
  # adapter weights at a fixed cadence.
  sync_ref_model: false
  ref_model_mixup_alpha: 0.6
  ref_model_sync_steps: 100

  # Defense-experiment knobs (disabled by default — default = vanilla GRPO).
  # entropy_coef: if > 0, add `-entropy_coef * mean_completion_entropy` to the
  # training loss. Discourages mode collapse / degenerate short-output
  # shortcutting by rewarding high-entropy completions.
  entropy_coef: 0.0
  # lora_reset_every: if > 0, every N optimizer steps, re-initialize LoRA
  # adapter weights (A ~ kaiming, B = 0) and clear their optimizer state.
  # PEFT-compatible analog of TRL's sync_ref_model intervention.
  lora_reset_every: 0

reward:
  judge_backend: "gemini"  # Backend for LLM judge: "gemini" or "vllm"
  llm_judge_reward_weight: 1.0  # Weight for LLM judge reward component
  reward_from_outcome_weight: 1.0  # Weight for reward from outcome component

vllm:
  use_vllm: true  # Whether to use vLLM for efficient inference
  host: "localhost"  # Host address for vLLM server
  port: 8422  # Port number for vLLM server
  gpu_memory_utilization: 0.85  # GPU memory utilization ratio for vLLM
  request_timeout: 3600  # Timeout for vLLM requests in seconds
  mode: "server"  # vLLM mode ("server", "colocate")
  guided_decoding_regex: null  # Regular expression for guided decoding (null for none)
  tensor_parallel_size: 1  # Number of GPUs for tensor parallelism in vLLM

# New configuration for reward model VLLM server (completely separate from TRL VLLM)
reward_vllm:
  use_vllm: false  # Default to Gemini for reward model inference
  host: "localhost"  # Host address for reward model VLLM server
  port: 8421  # Port number for reward model VLLM server (different from TRL VLLM)
  model_name: "Qwen/Qwen3-30B-A3B-Instruct-2507"  # Model name for reward model VLLM server
  request_timeout: 3600  # Timeout for reward model VLLM requests in seconds

gemini:
  api_key: null  # Deprecated: set GEMINI_API_KEY in the environment instead of config files
  model: "gemini-3-flash-preview"  # Gemini model to use
  backend: null  # Gemini backend to use: "openai_compat" or "google_sdk"
  custom_prompt: ""  # Custom prompt template for LLM judging (leave empty for default)
  timeout: 30  # Timeout for Gemini API calls in seconds

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.0
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  modules_to_save:
    - "lm_head"

# GPU configuration
gpu:
  # Training GPU configuration
  training:
    gpu_ids: "0"  # GPU IDs for training, comma-separated for multiple GPUs (e.g., "0,1,2,3")
    num_gpus: 1   # Number of GPUs to use for training
    main_process_port: 28890  # Port for main process in distributed training
  
  # vLLM server GPU configuration
  vllm:
    gpu_ids: "1"  # GPU IDs for vLLM server, comma-separated for multiple GPUs
    num_gpus: 1   # Number of GPUs to use for vLLM server
    tensor_parallel_size: 1  # Tensor parallelism size for vLLM